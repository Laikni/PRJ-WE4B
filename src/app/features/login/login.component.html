<style>
.auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #6366f1 100%); }
.auth-card { background-color: var(--bg-card, #1a1a2e); border: 1px solid var(--border-color, #333); border-radius: 15px; max-width: 450px; width: 100%; padding: 3rem; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
.form-control { background-color: var(--secondary-dark, #2a2a3e) !important; border: 1px solid var(--border-color, #333) !important; color: var(--text-primary, #fff) !important; padding: 0.75rem 1rem; border-radius: 8px; }
.form-control:focus { border-color: #dc3545 !important; box-shadow: 0 0 0 0.2rem rgba(220,53,69,.25); }
.btn-auth { background-color: #dc3545; border: none; padding: 0.75rem 1.5rem; font-weight: 600; width: 100%; border-radius: 8px; }
.btn-auth:hover { background-color: #c82333; }
.divider { text-align: center; margin: 2rem 0; position: relative; }
.divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background-color: var(--border-color, #333); }
.divider span { background-color: var(--bg-card, #1a1a2e); padding: 0 1rem; position: relative; color: #aaa; }
</style>

<div class="auth-container">
  <div class="auth-card">
    <h2 class="text-white fw-bold">Connexion</h2>
    <p class="text-muted mb-4">Connectez-vous pour accéder à votre compte</p>

    <div class="alert alert-danger py-2 text-center" style="font-size:.85rem;" *ngIf="error">
      {{ error }}
    </div>

    <div class="divider"><span>Connectez-vous avec votre compte</span></div>

    <form [formGroup]="loginForm" (ngSubmit)="submit()">
      <div class="mb-3">
        <label class="form-label text-white">Adresse Email</label>
        <input type="email" class="form-control" formControlName="email" placeholder="votre@email.com">
      </div>
      <div class="mb-3">
        <label class="form-label text-white">Mot de passe</label>
        <input type="password" class="form-control" formControlName="password" placeholder="••••••••">
      </div>
      <div class="d-flex justify-content-between align-items-center mb-3 small">
        <span></span>
        <a href="#" class="text-secondary text-decoration-none">Mot de passe oublié ?</a>
      </div>
      <button type="submit" class="btn btn-auth btn-lg text-white" [disabled]="isLoading">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
        Connexion
      </button>
    </form>

    <div class="text-center mt-4">
      <p class="text-secondary">Pas encore de compte ?
        <a routerLink="/register" class="text-danger fw-bold">Créer un compte</a>
      </p>
    </div>
  </div>
</div>
